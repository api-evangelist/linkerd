meters:
  - name: bel_subscription
    unit: contract
    aggregation: count
    dimensions:
      - tier
      - cluster
  - name: proxy_cpu
    unit: vCPU-hour
    aggregation: sum
    dimensions:
      - cluster
      - namespace
      - workload
  - name: proxy_memory
    unit: GiB-hour
    aggregation: sum
    dimensions:
      - cluster
      - namespace
      - workload
  - name: control_plane_cpu
    unit: vCPU-hour
    aggregation: sum
    dimensions:
      - cluster
      - component
  - name: mesh_egress
    unit: GB
    aggregation: sum
    dimensions:
      - cluster
      - direction
principles:
  - name: Visibility
    description: Use Linkerd Viz / Prometheus metrics for proxy resource usage; Kubecost or OpenCost
      to attribute mesh sidecar cost to namespaces, workloads, and teams; Buoyant invoice for BEL subscription
      cost.
  - name: Allocation
    description: Tag namespaces and workloads with team / product labels so sidecar overhead (CPU / memory)
      can be charged back. Allocate BEL subscription cost across the clusters it covers.
  - name: Optimization
    description: Right-size proxy resource requests; use Linkerd's smaller proxy image vs sidecar-heavier
      meshes; consolidate clusters where BEL Strategic SLAs are not needed; reclaim BEL coverage from
      decommissioned clusters at renewal.
  - name: Accountability
    description: Assign a platform-team owner for the BEL contract; review proxy overhead and BEL tier
      fit annually at renewal alongside SLO and incident history.
