description: 'FOCUS-aligned FinOps for Linkerd: open-source service mesh with no per-call cost. Direct
  spend lives only with Buoyant Enterprise for Linkerd subscriptions (Basic / Premium / Strategic) when
  used. Indirect cost is the cluster compute / memory / network consumed by the Linkerd proxy sidecars
  and control plane — surfaced via your Kubernetes cost tooling (Kubecost, OpenCost, cloud provider
  cost APIs), not via Linkerd or Buoyant.'
sources:
  - https://linkerd.io
  - https://buoyant.io/pricing
  - https://buoyant.io/enterprise
