naftiko: 1.0.0-alpha2
info:
  label: Linkerd Proxy Admin API — Lifecycle
  description: 'Linkerd Proxy Admin API — Lifecycle. 1 operations. Lead operation: Linkerd Initiate proxy shutdown. Self-contained
    Naftiko capability covering one Linkerd business surface.'
  tags:
  - Linkerd
  - Lifecycle
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LINKERD_API_KEY: LINKERD_API_KEY
capability:
  consumes:
  - type: http
    namespace: proxy-admin-lifecycle
    baseUri: http://localhost:4191
    description: Linkerd Proxy Admin API — Lifecycle business capability. Self-contained, no shared references.
    resources:
    - name: shutdown
      path: /shutdown
      operations:
      - name: shutdownproxy
        method: POST
        description: Linkerd Initiate proxy shutdown
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: proxy-admin-lifecycle-rest
    port: 8080
    description: REST adapter for Linkerd Proxy Admin API — Lifecycle. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/shutdown
      name: shutdown
      description: REST surface for shutdown.
      operations:
      - method: POST
        name: shutdownproxy
        description: Linkerd Initiate proxy shutdown
        call: proxy-admin-lifecycle.shutdownproxy
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: proxy-admin-lifecycle-mcp
    port: 9090
    transport: http
    description: MCP adapter for Linkerd Proxy Admin API — Lifecycle. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: linkerd-initiate-proxy-shutdown
      description: Linkerd Initiate proxy shutdown
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: proxy-admin-lifecycle.shutdownproxy
      outputParameters:
      - type: object
        mapping: $.
